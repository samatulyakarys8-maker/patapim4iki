<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Damumed Assistant</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <main class="panel" id="mainPanel">
      <header class="app-header">
        <div>
          <p class="eyebrow">AI assistant</p>
          <h1>Damumed Assistant</h1>
          <p id="globalStatus" class="subtitle">Откройте форму приема пациента.</p>
        </div>
        <button id="themeToggle" class="icon-button" type="button" aria-label="Переключить тему">Темная</button>
      </header>

      <section id="chatTimeline" class="chat-timeline" aria-live="polite"></section>
      <section id="breakModePanel" class="break-mode-panel" hidden>
        <div class="break-mode-topline">
          <div>
            <p class="break-mode-title">Break Mode</p>
            <p id="breakModeStatus" class="break-mode-copy">Нажмите для старта</p>
          </div>
          <div class="break-mode-scoreboard">
            <span class="break-pill">Очки <strong id="breakModeScore">0</strong></span>
            <span class="break-pill">Рекорд <strong id="breakModeBest">0</strong></span>
          </div>
        </div>
        <div class="break-mode-actions">
          <button id="breakModeClose" class="ghost-button" type="button">Закрыть</button>
          <button id="breakModeRestart" class="ghost-button" type="button" hidden>Еще раз</button>
        </div>
        <canvas id="breakModeCanvas" class="break-mode-canvas" width="280" height="420" aria-label="Break Mode mini game"></canvas>
      </section>

      <section class="quick-actions" aria-label="Действия формы">
        <button id="applyPreview" class="primary-button" type="button">Применить в форму</button>
        <button id="saveInspection" class="ghost-button" type="button">Сохранить</button>
        <button id="saveCloseInspection" class="ghost-button" type="button">Сохранить и закрыть</button>
      </section>

      <form id="composer" class="composer">
        <textarea id="chatInput" placeholder="Вставьте текст приема или задайте вопрос советчику."></textarea>

        <div class="composer-toolbar">
          <div class="left-tools">
            <div class="tools-wrap">
              <button id="toolsToggle" class="control-button plus-button" type="button" aria-label="Открыть меню" aria-expanded="false">+</button>
              <div id="toolsMenu" class="tools-menu" hidden>
                <button id="toggleAdvisorMode" class="menu-item" type="button">Включить режим советчика</button>
                <button id="clearChat" class="menu-item danger" type="button">Очистить чат</button>
                <label class="menu-label" for="speakerTag">Кто говорит</label>
                <select id="speakerTag" class="menu-select" aria-label="Кто говорит">
                  <option value="auto">Определить автоматически</option>
                  <option value="doctor">Врач</option>
                  <option value="caregiver">Родитель</option>
                  <option value="patient">Пациент</option>
                  <option value="unknown">Неизвестно</option>
                </select>
                <button id="refreshContext" class="menu-item" type="button">Обновить контекст</button>
                <button id="loadDraft" class="menu-item" type="button">Показать предложения</button>
                <button id="exampleDoctor" class="menu-item" type="button">Пример врача</button>
                <button id="exampleCaregiver" class="menu-item" type="button">Пример родителя</button>
                <button id="breakModeTrigger" class="menu-item secret-break-trigger" type="button" title="Break Mode">Перерыв</button>
              </div>
            </div>

            <button id="advisorModePill" class="mode-pill" type="button" aria-pressed="false">
              <span id="advisorIndicator" class="status-dot" hidden></span>
              Режим советчика
              <span class="chevron">⌄</span>
            </button>
          </div>

          <div class="right-tools">
            <button id="voiceToggle" class="icon-control" type="button" aria-label="Запустить запись" title="Запись">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z"></path>
                <path d="M19 10v1a7 7 0 0 1-14 0v-1"></path>
                <path d="M12 18v3"></path>
                <path d="M8 21h8"></path>
              </svg>
            </button>
            <button id="sendMessage" class="send-button" type="submit" aria-label="Отправить">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 19V5"></path>
                <path d="m5 12 7-7 7 7"></path>
              </svg>
            </button>
          </div>
        </div>
      </form>
    </main>
    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
